# USERNAME
label {
    monitor = *
    text = $USER
    font_family = Monospace
    font_size = 20
    color = rgba(255, 255, 255, 0.85)
    position = 0, 40
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor = *
    size = 300, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Enter password for <b>$USER</b></i>
    hide_input = false
    check_color = rgba(120, 220, 120, 0.9)
    fail_color = rgba(255, 80, 80, 0.9)
    fail_text = Incorrect password (<b>$ATTEMPTS</b>)
    capslock_color = rgba(255, 255, 0, 0.9)
    position = 0, -35
    halign = center
    valign = center
}
