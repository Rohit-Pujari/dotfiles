# GENERAL
general {
    hide_cursor = true
}

# BACKGROUND BLUR
background {
    monitor = *
    blur_passes = 3
    blur_size = 8
    vibrancy = 0.25
    noise = 0.02
    contrast = 0.9
    brightness = 0.9
}

# TIME (Top right)
label {
    monitor = *
    text = cmd[update:1000] date '+%H:%M:%S'
    font_family = Monospace
    font_size = 80
    color = rgba(255, 255, 255, 0.95)
    position = -30, 0
    halign = right
    valign = top
}

# DATE (below time)
label {
    monitor = *
    text = cmd[update:60000] date '+%A, %d %B %Y'
    font_family = Monospace
    font_size = 24
    color = rgba(200, 200, 200, 0.8)
    position = -30, -130
    halign = right
    valign = top
}

